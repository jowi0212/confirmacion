<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmado | JOWI'S</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fuente -->

  <style>

<body>

  <div class="box">

    <img src="logo.png" class="logo" alt="JOWI'S">

    <h1>Ahora sí.</h1>

    <p>

    </p>

    <p>
      Estás dentro y ahora solo queda que le saques provecho. Eso ya depende de ti.
    </p>

    <p>
      Nos vemos pronto.
    </p>

</html>
